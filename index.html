<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganzon's POS System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
    <h2>🛒 Ganzon's POS</h2>

    <ul>
        <li>🏠 Dashboard</li>
        <li>🛍 Products</li>
        <li>📦 Inventory</li>
        <li>📊 Sales</li>
        <li>⚙ Settings</li>
    </ul>
</div>

<div class="main">

    <h1>Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h3>Total Sales</h3>
            <h2>₱<span id="sales">0</span></h2>
        </div>

        <div class="card">
            <h3>Items</h3>
            <h2 id="items">0</h2>
        </div>

        <div class="card">
            <h3>Products</h3>
            <h2>4</h2>
        </div>

        <div class="card">
            <h3>Status</h3>
            <h2>Active</h2>
        </div>

    </div>

    <h2 class="title">Products</h2>

    <div class="products">

        <div class="product">
            <h3>Coca Cola</h3>
            <p>₱30</p>
            <button onclick="addProduct('Coca Cola',30)">Add</button>
        </div>

        <div class="product">
            <h3>Pepsi</h3>
            <p>₱30</p>
            <button onclick="addProduct('Pepsi',30)">Add</button>
        </div>

        <div class="product">
            <h3>Sprite</h3>
            <p>₱30</p>
            <button onclick="addProduct('Sprite',30)">Add</button>
        </div>

        <div class="product">
            <h3>Royal</h3>
            <p>₱30</p>
            <button onclick="addProduct('Royal',30)">Add</button>
        </div>

    </div>

    <div class="cart">

        <h2>Shopping Cart</h2>

        <ul id="cart"></ul>

        <h2>Total : ₱<span id="total">0</span></h2>

    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
